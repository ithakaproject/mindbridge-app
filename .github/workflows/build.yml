name: EAS Build and Submit

on:
  push:
    branches:
      - main

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build app
        id: build
        run: |
          OUTPUT=$(eas build --platform all --non-interactive 2>&1)
          echo "$OUTPUT"
          ANDROID_URL=$(echo "$OUTPUT" | grep -o 'https://expo\.dev/artifacts/eas/[^ ]*\.apk' | head -1)
          IOS_URL=$(echo "$OUTPUT" | grep -o 'https://expo\.dev/artifacts/eas/[^ ]*\.ipa' | head -1)
          echo "android_url=$ANDROID_URL" >> $GITHUB_OUTPUT
          echo "ios_url=$IOS_URL" >> $GITHUB_OUTPUT

      - name: Submit iOS to TestFlight
        run: eas submit --platform ios --latest --non-interactive

      - name: Comment build links on commit
        uses: actions/github-script@v7
        with:
          script: |
            const androidUrl = '${{ steps.build.outputs.android_url }}';
            const body = [
              '## ✅ New build ready',
              '',
              `🤖 **Android APK:** ${androidUrl || 'See [EAS dashboard](https://expo.dev/accounts/ithakaproject/projects/mindbridge-app/builds)'}`,
              '',
              '🍏 **iOS:** Check TestFlight — submitted automatically',
              '',
              '_Install the APK on Android by opening the link directly on your phone._'
            ].join('\n');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
